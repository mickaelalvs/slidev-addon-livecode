name: CI ☑️

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: ✨ Check code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🎨 Format
        run: pnpm format:check

      - name: ✅ Test
        run: pnpm test
